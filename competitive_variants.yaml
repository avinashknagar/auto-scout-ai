# Competitive variant mapping — which specific variants compete across models
# Tiers are based on feature equivalence, not price

entry_budget_hatchback:
  tier_1:
    description: "Entry - manual AC, basic or no audio, minimal convenience"
    variants:
      - {make: "Maruti", model: "Alto 800", trims: ["STD", "STD(O)", "LXI"]}
      - {make: "Maruti", model: "Alto K10", trims: ["STD", "LXI", "LXI(O)"]}
      - {make: "Maruti", model: "S-Presso", trims: ["STD", "LXI"]}
      - {make: "Renault", model: "Kwid", trims: ["RXE"]}
      - {make: "Datsun", model: "Redi Go", trims: ["D", "A"]}
      - {make: "Hyundai", model: "Eon", trims: ["D-Lite", "D-Lite+", "Era"]}
      - {make: "Datsun", model: "Go", trims: ["D", "A"]}
  tier_2:
    description: "Mid - power windows, audio with Bluetooth, dual airbags (or driver-only on older cars)"
    variants:
      - {make: "Maruti", model: "Alto 800", trims: ["VXI", "VXI(O)"]}
      - {make: "Maruti", model: "Alto K10", trims: ["VXI", "VXI(O)", "VXI AMT", "VXI(O) AMT"]}
      - {make: "Maruti", model: "S-Presso", trims: ["VXI", "VXI AMT", "VXI(O)", "VXI(O) AMT"]}
      - {make: "Renault", model: "Kwid", trims: ["RXL", "RXL(O)", "RXL AMT", "RXL(O) AMT"]}
      - {make: "Datsun", model: "Redi Go", trims: ["A(O)", "T", "T(O)", "T(O) AMT", "T AMT"]}
      - {make: "Hyundai", model: "Eon", trims: ["Magna", "Magna(O)", "Sportz"]}
      - {make: "Datsun", model: "Go", trims: ["T", "T(O)"]}
  tier_3:
    description: "Top - touchscreen infotainment, alloys (where available), rear camera, extra kit"
    variants:
      - {make: "Maruti", model: "S-Presso", trims: ["VXI+", "VXI+ AMT"]}
      - {make: "Renault", model: "Kwid", trims: ["RXT", "RXT AMT", "Climber", "Climber AMT"]}
      # Alto 800 / Alto K10 / Eon / Go / Redi Go generally do not reach full modern 'tier_3' spec

tallboy_hatchback:
  tier_1:
    description: "Entry - basic AC, limited power features"
    variants:
      - {make: "Maruti", model: "WagonR", trims: ["LXI", "LXI(O)", "LXI CNG"]}
      - {make: "Maruti", model: "Celerio", trims: ["LXI", "LXI(O)", "LXI CNG"]}
      - {make: "Hyundai", model: "Santro", trims: ["Era"]}
      - {make: "Hyundai", model: "New Santro", trims: ["Era", "Magna"]}
  tier_2:
    description: "Mid - power windows all around, music system, body-colored fittings"
    variants:
      - {make: "Maruti", model: "WagonR", trims: ["VXI", "VXI(O)", "VXI AMT", "ZXI"]}
      - {make: "Maruti", model: "Celerio", trims: ["VXI", "VXI(O)", "VXI AMT", "ZXI"]}
      - {make: "Hyundai", model: "Santro", trims: ["Magna", "Sportz"]}
      - {make: "Hyundai", model: "New Santro", trims: ["Magna AMT", "Sportz", "Sportz AMT"]}
  tier_3:
    description: "Top - touchscreen (on newer models), more safety and cosmetic enhancements"
    variants:
      - {make: "Maruti", model: "WagonR", trims: ["ZXI AMT", "ZXI+", "ZXI+ AMT", "ZXI PLUS"]}
      - {make: "Maruti", model: "Celerio", trims: ["ZXI AMT", "ZXI+", "ZXI+ AMT"]}
      - {make: "Hyundai", model: "Santro", trims: ["Asta"]}
      - {make: "Hyundai", model: "New Santro", trims: ["Asta"]}

compact_hatchback:
  tier_1:
    description: "Entry - AC, limited infotainment, basic safety"
    variants:
      - {make: "Tata", model: "Tiago", trims: ["XE", "XM"]}
      - {make: "Hyundai", model: "Grand I10", trims: ["Era", "Magna"]}
      - {make: "Hyundai", model: "Grand I10 Nios", trims: ["Era", "Magna"]}
      - {make: "Ford", model: "Figo", trims: ["Ambiente"]}
  tier_2:
    description: "Mid - proper audio/Bluetooth, power windows, rear sensors"
    variants:
      - {make: "Tata", model: "Tiago", trims: ["XT", "XT(O)", "XZ", "XTA"]}
      - {make: "Tata", model: "Tiago Nrg", trims: ["XT", "XZ"]}
      - {make: "Hyundai", model: "Grand I10", trims: ["Sportz"]}
      - {make: "Hyundai", model: "Grand I10 Nios", trims: ["Sportz", "Sportz(O)"]}
      - {make: "Ford", model: "Figo", trims: ["Trend", "Titanium"]}
  tier_3:
    description: "Top - touchscreen, alloys, camera, auto AC / extra safety"
    variants:
      - {make: "Tata", model: "Tiago", trims: ["XZ+", "XZ+ DT", "XZ+ AMT", "XZA", "XZA PLUS", "XZA+", "XZA+ DT"]}
      - {make: "Hyundai", model: "Grand I10 Nios", trims: ["Asta", "Asta AMT"]}
      - {make: "Ford", model: "Figo", trims: ["Titanium Blu", "Titanium+ AT"]}

premium_hatchback:
  tier_1:
    description: "Entry - AC, basic audio, minimal cosmetic/safety upgrades"
    variants:
      - {make: "Maruti", model: "Swift", trims: ["LXI", "LDI"]}
      - {make: "Maruti", model: "Baleno", trims: ["Sigma"]}
      - {make: "Hyundai", model: "Elite I20", trims: ["Era", "Magna"]}
      - {make: "Tata", model: "Altroz", trims: ["XE", "XE+"]}
      - {make: "Toyota", model: "Glanza", trims: ["G", "E"]} # lower-spec Glanza equivalents
      - {make: "Honda", model: "Jazz", trims: ["SV"]}
      - {make: "Volkswagen", model: "Polo", trims: ["Trendline"]}
  tier_2:
    description: "Mid - dual airbags, power features, better audio, more convenience"
    variants:
      - {make: "Maruti", model: "Swift", trims: ["VXI", "VXI(O)", "VXI AMT"]}
      - {make: "Maruti", model: "Baleno", trims: ["Delta"]}
      - {make: "Hyundai", model: "Elite I20", trims: ["Sportz"]}
      - {make: "Tata", model: "Altroz", trims: ["XM", "XM+", "XT"]}
      - {make: "Toyota", model: "Glanza", trims: ["S", "G Smart Hybrid"]}
      - {make: "Honda", model: "Jazz", trims: ["V", "V CVT"]}
      - {make: "Volkswagen", model: "Polo", trims: ["Comfortline", "Comfortline Plus"]}
  tier_3:
    description: "Top - touchscreen, alloys, rear camera, projectors, additional safety"
    variants:
      - {make: "Maruti", model: "Swift", trims: ["ZXI", "ZXI+", "ZXI AMT", "ZXI+ AMT"]}
      - {make: "Maruti", model: "Baleno", trims: ["Zeta", "Alpha", "Zeta CVT", "Alpha CVT"]}
      - {make: "Hyundai", model: "Elite I20", trims: ["Asta", "Asta(O)"]}
      - {make: "Tata", model: "Altroz", trims: ["XZ", "XZ(O)", "XZ+", "XZ+ S"]}
      - {make: "Toyota", model: "Glanza", trims: ["V", "V CVT"]}
      - {make: "Honda", model: "Jazz", trims: ["VX", "ZX", "VX CVT", "ZX CVT"]}
      - {make: "Volkswagen", model: "Polo", trims: ["Highline", "Highline Plus", "GT TSI", "GT TDI"]}

crossover_hatchback:
  tier_1:
    description: "Entry - basic AC and audio, fewer styling/safety features"
    variants:
      - {make: "Maruti", model: "Ignis", trims: ["Sigma"]}
      - {make: "Ford", model: "Freestyle", trims: ["Ambiente"]}
      - {make: "Citroen", model: "C3", trims: ["Live"]}
  tier_2:
    description: "Mid - better infotainment, power features, additional safety"
    variants:
      - {make: "Maruti", model: "Ignis", trims: ["Delta"]}
      - {make: "Ford", model: "Freestyle", trims: ["Trend", "Titanium"]}
      - {make: "Citroen", model: "C3", trims: ["Feel"]}
  tier_3:
    description: "Top - touchscreen, alloys, rear camera, extra kit"
    variants:
      - {make: "Maruti", model: "Ignis", trims: ["Zeta", "Alpha"]}
      - {make: "Ford", model: "Freestyle", trims: ["Titanium+", "Flair"]}
      - {make: "Citroen", model: "C3", trims: ["Shine"]}

